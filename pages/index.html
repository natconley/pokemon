<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/loading.css" />
    <link rel="stylesheet" href="../css/index.css" />
</head>

<body>
    <!-- Laddningsskärm -->
    <div id="loading-overlay">
        <div class="loading-inner">
            <img class="loading-ball" src="assets/pokeball.svg" alt="Loading" />
            <p id="loading-msg">Loading…</p>
            <div class="loading-bar-wrap">
                <div id="loading-bar"></div>
            </div>
        </div>
    </div>

    <!-- Navigationsfält -->
    <div class="topbar">
        <img src="/assets/pokeball.svg" alt="Pokeball Icon" class="icon" />
        <span class="topbar-title">Pokédex</span>
        <div class="topbar-right">
            <button id="theme-toggle" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </div>

    <header>
        <div class="controls-wrap">
            <div class="search-wrap">
                <input id="search" type="text" placeholder="🔍  Search Pokémon or number…" />
            </div>
            <select id="sort-select">
                <option value="A-Z">A → Z</option>
                <option value="Z-A">Z → A</option>
                <option value="number">Number</option>
                <option value="evolutions">Evolutions</option>
                <option value="Bywegiht">Bywegiht</option>
                <option value="HP">HP</option>
            </select>
        </div>
        <div id="filtersdrop">
            <button onclick="showfilters()" class="filtersbtn">Advanced Filters
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-arrow-down-icon lucide-arrow-down">
                    <path d="M12 5v14" />
                    <path d="m19 12-7 7-7-7" />
                </svg>
            </button>
            <ul id="typelist" class="typelist">
            </ul>
            <div id="filterssliders">
                <label id="hpsliderlabel">HP :
                    <input class="statsinput" type="number" id="hpnumber" min="1" max="500" value="0">
                    <input class="statslider" type="range" min="1" max="500" id="hpslider" value="0">
                </label>
                <label id="defsliderlabel">defence:
                    <input class="statsinput" type="number" id="defnumber" min="1" max="500" value="0">
                    <input class="statslider" type="range" min="1" max="500" id="defslider" value="0">
                </label>
                <label id="attsliderlabel">attack:
                    <input class="statsinput" type="number" id="attnumber" min="1" max="500" value="0">
                    <input class="statslider" type="range" min="1" max="500" id="attslider" value="0">
                </label>
                <label id="speedsliderlabel">speed:
                    <input class="statsinput" type="number" id="speednumber" min="1" max="500" value="0">
                    <input class="statslider" type="range" min="1" max="500" id="speedslider" value="0">
                </label>
                <label id="weightsliderlabel">weight:
                    <input class="statsinput" type="number" id="weightnumber" min="1" max="500" value="0">
                    <input class="statslider" type="range" min="1" max="500" id="weightslider" value="0">
                </label>
            </div>
        </div>
        <!-- Filter-chips: utanför topbar -->
        <div class="filters" id="filters">
            <div class="chip active" data-type="all" id="chip-all">All</div>
            <div class="chip chip-team" data-type="team" id="chip-team">Teambuilder</div>
        </div>
    </header>

    <!-- Kortnätet: utanför topbar -->
    <div class="grid" id="grid"></div>
    <div class="load-more-wrap">
        <button id="load-more">Load more</button>
    </div>
    <script src="../js/themes.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/render.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/filters.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/loading.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/index.css" />
</head>

<body>
    <!-- Laddningsskärm -->
    <div id="loading-overlay">
        <div class="loading-inner">
            <img class="loading-ball" src="assets/pokeball.svg" alt="Loading" />
            <p id="loading-msg">Loading…</p>
            <div class="loading-bar-wrap">
                <div id="loading-bar"></div>
            </div>
        </div>
    </div>

            <!-- Navigationsfält -->
            <div class="topbar">
                <img src="/assets/pokeball.svg" alt="Pokeball Icon" class="icon" />
                <div class="topbar-right">
                    <button id="theme-toggle" class="icon-btn" title="Toggle theme">☀️</button>
                </div>
            </div>

            <header>
                <div class="controls-wrap">
                    <div class="search-wrap">
                        <input id="search" type="text" placeholder="🔍  Search Pokémon or number…" />
                    </div>
                    <select id="sort-select">
                        <option value="evolutions">Evolutions</option>
                        <option value="number">Number</option>
                        <option value="az">A–Z</option>
                    </select>
                </div>
                <!-- Filter-chips: utanför topbar -->
                <div class="filters" id="filters">
                    <div class="chip active" data-type="all" id="chip-all">All</div>
                    <div class="chip chip-team" data-type="team" id="chip-team">Teambuilder</div>
                </div>
            </header>

            <!-- Kortnätet: utanför topbar -->
            <div class="grid" id="grid"></div>

    <script src="../js/themes.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/render.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="">

    <!--Nyckelord för webcrawlers-->
    <meta name="keywords" content="pokemon, nintendo">

    <!--JavaScript-->
    <script src="../js/detail.mjs" type="module"></script>

    <!--CSS Stylesheets-->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/detail.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/index.css" />

    <!--Huvudsidan-->
    <!--A canonical URL is the main, preferred, or official version of a webpage that you want search engines like Google to crawl and index. Förbättrar SEO-->
    <link rel="canonical" href="">

    <title>Document</title>
</head>

<body>

    <!-- Navigationsfält -->
    <nav class="topbar">
        <a class="topbar-left" href="../index.html">
        <img src="../assets/pokeball.svg" alt="Pokeball Icon" class="icon" />
        <span class="topbar-title">Pokédex</span>
        </a>
            <a href="teambuilder.html" class="chip chip-team" data-type="team" id="chip-team">Teambuilder</a>
        <div class="topbar-right">
            <button id="theme-toggle" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </nav>

    <main>

        <section>
            <button onclick="history.back()" class="btn back">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-arrow-left">
                    <path d="M19 12H5" />
                    <path d="m12 19-7-7 7-7" />
                </svg>
                Go back
            </button>

            <!--Hero section-->
            <div class="pokeHero">
                <img src="" alt="Pokemon sprite" id="pokeSprite">
                <div>
                    <!--Byt till <header> elementet?-->
                    <div class="alignItems flex-wrap gap1rem">
                        <h1 id="pokeName">Pokemon name</h1>
                        <span id="pokeId">Pokemon id</span>
                    </div>

                    <!--Description-->
                    <p id="pokeDescription"></p>

                    <button class="btn-team" aria-label="Adds pokemon to team">Add To Team</button>
                </div>
            </div>
        </section>

        <section id="section1">
            <!--Types-->
            <section id="typesSection">
                <div>
                    <h2 class="title">Type</h2>
                    <div></div>
                </div>
                <div>
                    <h2 class="title">Weaknesses</h2>
                    <div></div>
                </div>
                <div>
                    <h2 class="title">Strong against</h2>
                    <div></div>
                </div>
            </section>

            <!--Base stats-->
            <section id="statsSection">
                <h2>Base stats</h2>
                <div id="pokeHP">
                    <div>
                        <h3>HP</h3>
                        <p></p>
                    </div>
                    <!--Linjen mellan base statsen och progressbaren. Sätts med CSS-->
                    <!--Här sätts aria-hidden="true" eftersom det är endast ett dekorativ elemenent-->
                    <div aria-hidden="true"></div>
                    <!--Själva progressbaren-->
                    <div class="pokeBar"></div>
                    <div></div>
                </div>
                <div id="pokeAttack">
                    <div>
                        <h3>Attack</h3>
                        <p></p>
                    </div>
                    <div aria-hidden="true"></div>
                    <div class="pokeBar"></div>
                    <div></div>
                </div>
                <div id="pokeDefense">
                    <div>
                        <h3>Defense</h3>
                        <p></p>
                    </div>
                    <div aria-hidden="true"></div>
                    <div class="pokeBar"></div>
                    <div></div>
                </div>
                <div id="pokeSpecialAttack">
                    <div>
                        <h3>Sp. Attack</h3>
                        <p></p>
                    </div>
                    <div aria-hidden="true"></div>
                    <div class="pokeBar"></div>
                    <div></div>
                </div>
                <div id="pokeSpecialDefense">
                    <div>
                        <h3>Sp. Defense</h3>
                        <p></p>
                    </div>
                    <div aria-hidden="true"></div>
                    <div class="pokeBar"></div>
                    <div></div>
                </div>
                <div id="pokeSpeed">
                    <div>
                        <h3>Speed</h3>
                        <p></p>
                    </div>
                    <div aria-hidden="true"></div>
                    <div class="pokeBar"></div>
                    <div></div>
                </div>
            </section>
        </section>

        <!--Evolutions-->
        <section>
            <h2 class="title">Evolution chain</h2>
            <div id="pokeEvolution" class="pokeGrid">
            </div>
        </section>

        <!--Shiny-->
        <section id="shiny">
            <h2 class="title">Shiny</h2>
            <img src="" alt="Shiny sprite">
        </section>

        <!--Traits-->
        <section id="TraitsSection">
            <h2 class="title">Traits</h2>
            <div class="pokeGrid pokeSection">
                <div>
                    <h3>Height</h3>
                    <p id="pokeHeight"></p>
                </div>
                <div>
                    <h3>Weight</h3>
                    <p id="pokeWeight"></p>
                </div>
                <div>
                    <h3>Category</h3>
                    <p></p>
                </div>
                <div>
                    <h3>Abilities</h3>
                    <p id="pokeAbility"></p>
                </div>
            </div>
        </section>

        <!--Works well with-->
        <section id="suggestions">
            <h2 class="title">Works well with</h2>
            <div class="pokeGrid"></div>
        </section>

    </main>

    <script src="../js/themes.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/render.js"></script>
    <script src="../js/app.js"></script>

</body>

</html>

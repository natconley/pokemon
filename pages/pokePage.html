<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../pokePage.mjs" type="module"></script>
    <link rel="stylesheet" href="../pokePage.css">

    <title>Document</title>
</head>

<body>

    <!--Lägg till main-->

    <!--Hero section-->
    <section>
        <img src="" alt="Pokemon sprite" id="pokeSprite">
        <div class="alignItems">
            <h1 id="pokeName">Pokemon name</h1>
            <p id="pokeId">Pokemon id</p>
        </div>

        <!--Description-->
        <p id="pokeDescription"></p>
    </section>

    <!--Base stats-->
    <section>
        <h2>Base stats</h2>
        <div id="pokeHP">
            <h3>HP</h3>
            <p></p>
            <div class="pokeProgressBar">
                <div class="pokeBar"></div>
            </div>
        </div>
        <div id="pokeAttack">
            <h3>Attack</h3>
            <p></p>
            <div class="pokeProgressBar">
                <div class="pokeBar"></div>
            </div>
        </div>
        <div id="pokeDefense">
            <h3>Defense</h3>
            <p></p>
            <div class="pokeProgressBar">
                <div class="pokeBar"></div>
            </div>
        </div>
        <div id="pokeSpecialAttack">
            <h3>Special attack</h3>
            <p></p>
            <div class="pokeProgressBar">
                <div class="pokeBar"></div>
            </div>
        </div>
        <div id="pokeSpecialDefense">
            <h3>Special defense</h3>
            <p></p>
            <div class="pokeProgressBar">
                <div class="pokeBar"></div>
            </div>
        </div>
        <div id="pokeSpeed">
            <h3>Speed</h3>
            <p></p>
            <div class="pokeProgressBar">
                <div class="pokeBar"></div>
            </div>
        </div>
    </section>

    <!--Types & weaknesses-->
    <section>
        <div>
            <h2>Type</h2>
            <div id="pokeTypesDiv">
            </div>
        </div>
        <div>
            <h2>Weaknesses</h2>
            <div id="pokeWeaknessDiv">
            </div>
        </div>
    </section>

    <!--Evolutions-->
    <section>
        <h2>Evolution chain</h2>
        <div id="pokeEvolution" class="grid">
        </div>
    </section>

    <!--Shiny-->
    <section id="shiny">
        <h2>Shiny</h2>
        <img src="" alt="Shiny sprite">
    </section>

    <!--Traits-->
    <section>
        <h2>Traits</h2>
        <div class="grid">
            <div>
                <h3>Height</h3>
                <p id="pokeHeight"></p>
            </div>
            <div>
                <h3>Weight</h3>
                <p id="pokeWeight"></p>
            </div>
            <div>
                <h3>Category</h3>
                <p>TBA</p>
            </div>
            <div>
                <h3>Abilities</h3>
                <p id="pokeAbility"></p>
            </div>
        </div>
    </section>

    <!--Works well with-->
    <section>
        <h3>Works well with</h3>
        <img src="" alt="Suggested pokeSprite">
        <img src="" alt="Suggested pokeSprite">
        <img src="" alt="Suggested pokeSprite">
        <img src="" alt="Suggested pokeSprite">
    </section>


</body>

</html>

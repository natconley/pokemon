<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../js/pokePage.mjs" type="module"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/pokePage.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/index.css" />

    <title>Document</title>
</head>

<body>

    <!-- Navigationsfält -->
    <div class="topbar">
        <img src="/assets/pokeball.svg" alt="Pokeball Icon" class="icon" />
        <span class="topbar-title">Pokédex</span>
        <div class="topbar-right">
            <button id="theme-toggle" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </div>

    <main>

        <!--Hero section-->
        <section class="pokeHero">
            <img src="" alt="Pokemon sprite" id="pokeSprite">
            <div>
                <div class="alignItems flex-wrap gap1rem">
                    <h1 id="pokeName">Pokemon name</h1>
                    <span id="pokeId">Pokemon id</span>
                </div>

                <!--Description-->
                <p id="pokeDescription"></p>

                <button class="btn-team">Add To Team</button>
            </div>
        </section>

        <div id="section1">
            <!--Types & weaknesses-->
            <section class="flex-column gap1rem">
                <div class="flex-column gap1rem">
                    <h2>Type</h2>
                    <div id="pokeTypesDiv">
                    </div>
                </div>
                <div class="flex-column gap1rem">
                    <h2>Weaknesses</h2>
                    <div id="pokeWeaknessDiv">
                    </div>
                </div>
            </section>

            <!--Base stats-->
            <section class="stats">
                <h2>Base stats</h2>
                <div id="pokeHP" class="alignItems gap1rem">
                    <div>
                        <h3>HP</h3>
                        <p></p>
                    </div>
                    <!--Linjen mellan base statsen och progressbaren. Sätts med CSS-->
                    <div></div>
                    <!--Själva progressbaren-->
                    <div class="pokeBar"></div>
                </div>
                <div id="pokeAttack" class="alignItems gap1rem">
                    <div>
                        <h3>Attack</h3>
                        <p></p>
                    </div>
                    <div></div>
                    <div class="pokeBar"></div>
                </div>
                <div id="pokeDefense" class="alignItems gap1rem">
                    <div>
                        <h3>Defense</h3>
                        <p></p>
                    </div>
                    <div></div>
                    <div class="pokeBar"></div>
                </div>
                <div id="pokeSpecialAttack" class="alignItems gap1rem">
                    <div>
                        <h3>Sp. Attack</h3>
                        <p></p>
                    </div>
                    <div></div>
                    <div class="pokeBar"></div>
                </div>
                <div id="pokeSpecialDefense" class="alignItems gap1rem">
                    <div>
                        <h3>Sp. Defense</h3>
                        <p></p>
                    </div>
                    <div></div>
                    <div class="pokeBar"></div>
                </div>
                <div id="pokeSpeed" class="alignItems gap1rem">
                    <div>
                        <h3>Speed</h3>
                        <p></p>
                    </div>
                    <div></div>
                    <div class="pokeBar"></div>
                </div>
            </section>
        </div>

        <!--Evolutions-->
        <section>
            <h2>Evolution chain</h2>
            <div id="pokeEvolution" class="grid">
            </div>
        </section>

        <!--Shiny-->
        <section id="shiny">
            <h2>Shiny</h2>
            <img src="" alt="Shiny sprite">
        </section>

        <!--Traits-->
        <section>
            <h2>Traits</h2>
            <div class="grid">
                <div>
                    <h3>Height</h3>
                    <p id="pokeHeight"></p>
                </div>
                <div>
                    <h3>Weight</h3>
                    <p id="pokeWeight"></p>
                </div>
                <div>
                    <h3>Category</h3>
                    <p>TBA</p>
                </div>
                <div>
                    <h3>Abilities</h3>
                    <p id="pokeAbility"></p>
                </div>
            </div>
        </section>

        <!--Works well with-->
        <section>
            <h3>Works well with</h3>
            <img src="" alt="Suggested pokeSprite">
            <img src="" alt="Suggested pokeSprite">
            <img src="" alt="Suggested pokeSprite">
            <img src="" alt="Suggested pokeSprite">
        </section>

    </main>

    <script src="../js/themes.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/render.js"></script>
    <script src="../js/app.js"></script>

</body>

</html>
